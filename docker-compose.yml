services:
  nats-exporter:
    image: natsio/prometheus-nats-exporter:latest
    env_file:
      - ./Infrastructure/.env
    ports:
      - "7777:7777"
    command:
      - "-varz"
      - "http://${NATS_HOST}:${NATS_HTTP_PORT}"
    volumes:
      - ./certs/ca.pem:/etc/nats/certs/ca.pem:ro
    depends_on:
      - nats

  prometheus:
    image: prom/prometheus:latest #sceglierai te la versione
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    depends_on:
      - nats
      - nats-exporter

  grafana:
    image: grafana/grafana:latest #sceglierai te la versione
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

include:
  - path: ./Infrastructure/docker-compose.yml