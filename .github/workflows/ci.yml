name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        if: ${{ hashFiles('go.mod') != '' || hashFiles('backend/go.mod') != '' }}
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Go checks (root module)
        if: ${{ hashFiles('go.mod') != '' }}
        shell: bash
        run: |
          set -euo pipefail
          go mod download

          if find . -type f -name '*.go' -not -path './vendor/*' | grep -q .; then
            UNFORMATTED="$(gofmt -l $(find . -type f -name '*.go' -not -path './vendor/*'))"
            if [ -n "${UNFORMATTED}" ]; then
              echo "These Go files are not gofmt-formatted:"
              echo "${UNFORMATTED}"
              exit 1
            fi
            go vet ./...
            go test ./...
          else
            echo "No Go files in root module; skipping gofmt/vet/test."
          fi

      - name: Go checks (backend module)
        if: ${{ hashFiles('backend/go.mod') != '' }}
        shell: bash
        run: |
          set -euo pipefail
          cd backend
          go mod download

          if find . -type f -name '*.go' -not -path './vendor/*' | grep -q .; then
            UNFORMATTED="$(gofmt -l $(find . -type f -name '*.go' -not -path './vendor/*'))"
            if [ -n "${UNFORMATTED}" ]; then
              echo "These backend Go files are not gofmt-formatted:"
              echo "${UNFORMATTED}"
              exit 1
            fi
            go vet ./...
            go test ./...
          else
            echo "No Go files in backend module; skipping gofmt/vet/test."
          fi

      - name: Setup Node
        if: ${{ hashFiles('package.json') != '' || hashFiles('frontend/package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"

      - name: Node checks (root)
        if: ${{ hashFiles('package.json') != '' }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

          if [ -d src ] || [ -f angular.json ] || [ -f tsconfig.json ] || [ -f vite.config.ts ] || [ -f webpack.config.js ]; then
            npm run lint --if-present
            npm run test --if-present
            npm run build --if-present
          else
            echo "No app source/config detected at root; skipping npm scripts."
          fi

      - name: Node checks (frontend)
        if: ${{ hashFiles('frontend/package.json') != '' }}
        shell: bash
        run: |
          set -euo pipefail
          cd frontend

          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

          if [ -d src ] || [ -f angular.json ] || [ -f tsconfig.json ] || [ -f vite.config.ts ] || [ -f webpack.config.js ]; then
            npm run lint --if-present
            npm run test --if-present
            npm run build --if-present
          else
            echo "No app source/config detected in frontend; skipping npm scripts."
          fi
