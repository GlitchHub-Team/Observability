name: CI

on:
  push:
    branches:
      - main
      - issue-*

permissions:
  contents: read

jobs:
  validate:
    runs-on: self-hosted
    env:
      NATS_HOST: ${{ vars.NATS_HOST }}
      NATS_PORT: ${{ vars.NATS_PORT }}
      NATS_HTTP_PORT: ${{ vars.NATS_HTTP_PORT }}
      NATS_ENCRYPTION_KEY: ${{ secrets.NATS_ENCRYPTION_KEY }}
      NATS_SYS_ACCOUNT_ID: ${{ vars.NATS_SYS_ACCOUNT_ID }}
      NATS_APPLICATION_CORE_ID: ${{ vars.NATS_APPLICATION_CORE_ID }}
      POSTGRES_HOST: ${{ vars.POSTGRES_HOST }}
      POSTGRES_PORT: ${{ vars.POSTGRES_PORT }}
      POSTGRES_DB: ${{ vars.POSTGRES_DB }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      CLOUD_POSTGRES_HOST: ${{ vars.CLOUD_POSTGRES_HOST }}
      CLOUD_POSTGRES_PORT: ${{ vars.CLOUD_POSTGRES_PORT }}
      CLOUD_POSTGRES_DB: ${{ vars.CLOUD_POSTGRES_DB }}
      CLOUD_POSTGRES_USER: ${{ secrets.CLOUD_POSTGRES_USER }}
      CLOUD_POSTGRES_PASSWORD: ${{ secrets.CLOUD_POSTGRES_PASSWORD }}
      GATEWAY_BASE_CREDS_PATH: base.creds
      TEST_CREDS_PATH: admin_test.creds
      CA_PEM_PATH: ca.pem

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Infrastructure
        uses: GlitchHub-Team/Infrastructure/.github/actions/start@main
        with:
          NATS_STREAM_SETUPPER_CREDS: ${{ secrets.NATS_STREAM_SETUPPER_CREDS }}
          NATS_SERVER_TLS_KEY: ${{ secrets.NATS_SERVER_TLS_KEY }}
          GATEWAY1_CREDS: ${{ secrets.GATEWAY1_CREDS }}
          GATEWAY2_CREDS: ${{ secrets.GATEWAY2_CREDS }}

      - name: Verify containers startup
        shell: bash
        run: |
          set -euo pipefail

          max_attempts=24
          sleep_seconds=5
          compose_cmd="docker compose -f Infrastructure/docker-compose.yml"
          services="$(${compose_cmd} config --services)"

          if [ -z "${services}" ]; then
            echo "::error::No services found in docker compose config"
            exit 1
          fi

          for attempt in $(seq 1 "${max_attempts}"); do
            all_ok=true
            echo "Attempt ${attempt}/${max_attempts}"

            for svc in ${services}; do
              if [ "${svc}" = "nats-manager" ]; then
                echo "Service ${svc}: skipped (one-shot setup container)"
                continue
              fi

              cid="$(${compose_cmd} ps -q "${svc}")"
              if [ -z "${cid}" ]; then
                echo "Service ${svc}: container not created yet"
                all_ok=false
                continue
              fi

              status="$(docker inspect -f '{{.State.Status}}' "${cid}")"
              exit_code="$(docker inspect -f '{{.State.ExitCode}}' "${cid}")"
              health="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "${cid}")"

              echo "Service ${svc}: status=${status}, health=${health}, exit_code=${exit_code}"

              if [ "${status}" = "exited" ] && [ "${exit_code}" != "0" ]; then
                echo "::error::Service ${svc} exited with non-zero code ${exit_code}"
                ${compose_cmd} logs --no-color --tail=200 "${svc}" || true
                exit 1
              fi

              if [ "${status}" = "running" ] && [ "${health}" != "none" ] && [ "${health}" != "healthy" ]; then
                all_ok=false
              fi

              if [ "${status}" != "running" ] && [ "${status}" != "exited" ]; then
                all_ok=false
              fi
            done

            if [ "${all_ok}" = "true" ]; then
              echo "All services started correctly."
              ${compose_cmd} ps
              exit 0
            fi

            sleep "${sleep_seconds}"
          done

          echo "::error::Services did not reach expected startup state in time"
          ${compose_cmd} ps || true
          ${compose_cmd} logs --no-color --tail=200 || true
          exit 1

      - name: Stop
        if: always()
        uses: GlitchHub-Team/Infrastructure/.github/actions/stop@main
