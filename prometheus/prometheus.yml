global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  # Current baseline: monitor NATS through nats-exporter.
  - job_name: nats
    metrics_path: /metrics
    scrape_interval: 5s
    static_configs:
      - targets:
          - nats-exporter:7777

  # Future application jobs to enable when the services expose /metrics.
  # These jobs correspond to the approved metric set for the MVP.

